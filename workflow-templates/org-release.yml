# ============================================================================
# org-release.yml
# Thin caller workflow — lives in each repo at .github/workflows/org-release.yml
#
# This file does nothing except call the org's central reusable workflow.
# All logic lives in the org .github repo. Do not add steps here.
# ============================================================================

name: Org Release Governance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-governance:
    uses: Axel-Automotive/.github/.github/workflows/release-governance.yml@main
    with:
      release_branch: "main"
      versioning_strategy: "labels"       # or "conventional-commits"
      create_github_release: true
      dry_run: false
    secrets: inherit
